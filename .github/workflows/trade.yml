name: AI Trading Buddy

# Free on PUBLIC repos (unlimited Actions minutes). Cron is in UTC and does NOT
# observe daylight saving, so we fire generously across the widest possible US
# market window (13:00–21:00 UTC, Mon–Fri). The bot itself checks Alpaca's real
# market clock each run and skips when the market is actually closed — so DST is
# handled correctly without touching this file.
on:
  schedule:
    - cron: "*/15 13-20 * * 1-5"   # every 15 min during the trading day (UTC)
  workflow_dispatch: {}             # lets you trigger a run by hand

# Avoid overlapping runs stepping on each other.
concurrency:
  group: trading-buddy
  cancel-in-progress: false

jobs:
  cycle:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      # All secrets come from repo Settings -> Secrets and variables -> Actions.
      # NEVER commit real keys. The .env file is gitignored for local use only.
      #
      # KEY ISOLATION (important): `run-all` is strictly BYOK. Every user runs with
      # THEIR OWN keys, decrypted from the database with MASTER_ENCRYPTION_KEY.
      # The host's personal Alpaca/Anthropic/Finnhub/Twilio keys are deliberately
      # NOT passed here — that makes it structurally impossible for another user's
      # cycle to fall back to the host's API keys. Users with no keys are skipped.
      # (Only the single-user `python run.py once` path reads per-provider env keys.)
      - name: Run one decision cycle for all users
        env:
          # Pause the whole worker by setting this secret to "true". Per-user
          # pausing is done in the dashboard (or `run.py users pause --user ...`).
          BUDDY_PAUSED: ${{ secrets.BUDDY_PAUSED }}
          # Decrypts each user's stored BYOK keys. Required.
          MASTER_ENCRYPTION_KEY: ${{ secrets.MASTER_ENCRYPTION_KEY }}
          # Where the users/keys/settings + audit data live. If DATABASE_URL is
          # set the worker uses Supabase Postgres (service role); else SQLite.
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python run.py run-all

      # The SQLite audit log is ephemeral on Actions runners. Alpaca holds the
      # real position/equity state, so this commit-back is OPTIONAL — it just
      # preserves the decision/trade history + pending queue between runs.
      - name: Persist audit log
        if: always()
        run: |
          git config user.name "trading-buddy"
          git config user.email "bot@users.noreply.github.com"
          git add -f portfolio.db || true
          git commit -m "audit log $(date -u +%FT%TZ)" || echo "nothing to commit"
          git push || echo "push skipped"
