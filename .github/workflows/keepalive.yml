name: Supabase keep-alive

# Free Supabase projects pause after 7 days of inactivity. The trading worker
# already pings the DB on weekdays, but this daily no-op query covers weekends
# and holidays so the project never sleeps.
on:
  schedule:
    - cron: "17 8 * * *"   # once a day, 08:17 UTC
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Touch the database
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          curl -fsS "$SUPABASE_URL/rest/v1/profiles?select=id&limit=1" \
            -H "apikey: $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
            && echo "keep-alive ping ok"
